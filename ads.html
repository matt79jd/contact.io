<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Acoustic Design Systems</title>

<style>
:root{
  --bg:#07111f;
  --card:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:rgba(255,255,255,.7);

  --blue1:#35a0ff;
  --blue2:#0d66e8;
  --orange1:#ffb04d;
  --orange2:#f06a1a;
  --green1:#3fd48d;
  --green2:#159b5d;
}

body{
  margin:0;
  font-family:-apple-system, system-ui, Arial;
  background:linear-gradient(180deg,#07111f,#0c1b30);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:var(--text);
}

.card{
  width:100%;
  max-width:500px;
  padding:25px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  text-align:center;
}

.logo{
  width:200px;
  margin-bottom:20px;
  animation:breathe 5s ease-in-out infinite;
}

@keyframes breathe{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

h1{margin:10px 0;}
.sub{color:var(--muted);margin-bottom:20px;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.tile{
  padding:20px;
  border-radius:15px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.website{background:linear-gradient(180deg,var(--blue1),var(--blue2));}
.ticket{background:linear-gradient(180deg,var(--orange1),var(--orange2));}
.call{background:linear-gradient(180deg,var(--green1),var(--green2));}

.footer{
  margin-top:20px;
  font-size:14px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="card">

  <img src="logo-graphic.png" class="logo" />

  <h1>Acoustic Design Systems</h1>
  <div class="sub">Smart home, AV, and support</div>

  <div class="grid">

    <a class="tile website" href="https://www.adslv.com/" target="_blank">
      Website
    </a>

    <a class="tile ticket" href="https://adslvhelp.zendesk.com/" target="_blank">
      Service
    </a>

    <!-- 😈 RICKROLL -->
    <a class="tile call" href="https://youtu.be/dQw4w9WgXcQ" target="_blank">
      Call ADS
    </a>

  </div>

  <div class="footer">
    702-648-7474
  </div>

</div>

</body>
</html>
